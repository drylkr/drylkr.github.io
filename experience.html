<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | Daryl Ong</title>
    <meta name="description" content="Discover Daryl Ong's software engineering journey, career milestones, and experience in web and mobile development." />
    <meta name="keywords" content="Daryl Ong experience, software engineering career, web development, mobile development, portfolio" />
    <meta name="author" content="Daryl Ong" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Experience | Daryl Ong" />
    <meta property="og:description" content="Discover Daryl Ong's software engineering journey and career experience in web and mobile development." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://darylkr.github.io/experience.html" />
    <link rel="canonical" href="https://darylkr.github.io/experience.html" />
    <script>
      (function() {
        const saved = localStorage.getItem('site-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.dataset.theme = saved;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <link rel="preload" as="fetch" href="navbar.html" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">

  <header id="navbar-container"></header>

  <main>
        <!-- About Section -->
    <section class="about">
      <h1 class="about-name">My Experience</h1>
      <p class="about-description">
       A timeline of my career and education, highlighting key roles, projects, and learning experiences.
      </p>
    </section>

    <!-- Experience Timeline -->
    <section class="experience-timeline" id="experience-timeline"></section>


  </main>

  <footer class="site-footer"></footer>

  </div>

  <script>
    (function() {
      const authKey = "experienceUnlocked";
      const expiryKey = "experienceUnlockedExpires";
      const timeoutMs = 3 * 60 * 1000;
      const currentPage = window.location.pathname.split("/").pop();
      if (currentPage !== "experience.html") return;

      const expiresAt = Number(sessionStorage.getItem(expiryKey));
      const isUnlocked = expiresAt && !Number.isNaN(expiresAt) && Date.now() <= expiresAt && sessionStorage.getItem(authKey) === "true";
      if (isUnlocked) return;

      sessionStorage.removeItem(authKey);
      sessionStorage.removeItem(expiryKey);
      const answer = window.prompt("Enter the password to view this page:");
      if (answer === "xp") {
        sessionStorage.setItem(authKey, "true");
        sessionStorage.setItem(expiryKey, String(Date.now() + timeoutMs));
        return;
      }
      window.location.href = "index.html";
    })();
  </script>
  <script src="js/navbar.js" defer></script>
  <script src="js/footer.js" defer></script>
  <script src="js/experience.js" defer></script>
  <script src="js/contact.js" defer></script>
  <script src="js/wip-badge.js" defer></script>
</body>
</html>
